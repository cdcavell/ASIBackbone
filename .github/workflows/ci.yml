name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  SOLUTION_PATH: ASIBackbone.slnx
  CONFIGURATION: Release
  PACKAGE_OUTPUT: artifacts/packages
  COVERAGE_OUTPUT: artifacts/coverage

jobs:
  build-test-pack:
    name: Build, test, and pack
    runs-on: ubuntu-latest

    steps:
      # actions/checkout@v4
      - name: Checkout repository
        uses: actions/checkout@<checkout-v4-sha>

      # actions/setup-dotnet@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@<setup-dotnet-v4-sha>
        with:
          dotnet-version: 10.0.x

      - name: Display .NET information
        run: dotnet --info

      - name: Restore
        run: dotnet restore "$SOLUTION_PATH"

      - name: Build
        run: dotnet build "$SOLUTION_PATH" --configuration "$CONFIGURATION" --no-restore

      - name: Test with coverage gate
        run: >
          dotnet test "$SOLUTION_PATH"
          --configuration "$CONFIGURATION"
          --no-build
          --verbosity normal
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:CoverletOutput="$COVERAGE_OUTPUT/"
          /p:Threshold=75
          /p:ThresholdType=line
          /p:ThresholdStat=total

      - name: Pack Core package
        run: >
          dotnet pack
          src/CDCavell.ASIBackbone.Core/CDCavell.ASIBackbone.Core.csproj
          --configuration "$CONFIGURATION"
          --no-build
          --output "$PACKAGE_OUTPUT"

      # actions/upload-artifact@v4
      - name: Upload package artifact
        uses: actions/upload-artifact@<upload-artifact-v4-sha>
        with:
          name: asi-backbone-packages
          path: ${{ env.PACKAGE_OUTPUT }}/*.nupkg
          if-no-files-found: error

      # actions/upload-artifact@v4
      - name: Upload coverage artifact
        uses: actions/upload-artifact@<upload-artifact-v4-sha>
        with:
          name: asi-backbone-coverage
          path: ${{ env.COVERAGE_OUTPUT }}/coverage.cobertura.xml
          if-no-files-found: error